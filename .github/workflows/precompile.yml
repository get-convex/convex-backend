name: Precompile Local Backend

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  release_dashboard:
    name: Build Convex Dashboard
    runs-on: [self-hosted, aws, x64, xlarge]
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Restore-only: OSS can't write this cache (cache-write role is get-convex/convex-only).
      - name: Restore pnpm artifacts
        uses: runs-on/cache/restore@bd330c5a5f6cbb837823ee25864f3c71a211c2e3 # v5.0.5
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          RUNS_ON_S3_BUCKET_CACHE: ${{ vars.RUNS_ON_S3_BUCKET_CACHE }}
        with:
          path: |
            ~/.local/share/pnpm/store
            npm-packages/.turbo/cache
          key:
            pnpm-cache-${{ hashFiles('npm-packages/pnpm-lock.yaml') }}-3
          restore-keys: pnpm-cache-

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: NPM install globals
        run: npm ci --prefix scripts

      - name: Install JS dependencies
        run: |
          just install-js

      - name: Build dashboard dependencies
        run: |
          just turbo run build --filter=dashboard-self-hosted^...

      - name: Build dashboard
        run: |
          cd npm-packages/dashboard-self-hosted && npm run build:export

      - name: Zip output
        run: |
          cd npm-packages/dashboard-self-hosted/out && zip -r ../../../dashboard.zip .

      - name: Precompute release name
        id: release_name
        shell: bash
        run: |
          echo "RELEASE_NAME=$(date +'%Y-%m-%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Upload Precompiled Artifacts
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dashboard.zip
          tag_name: precompiled-${{ steps.release_name.outputs.RELEASE_NAME }}
          name: Precompiled ${{ steps.release_name.outputs.RELEASE_NAME }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_backend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: "['self-hosted', 'aws', 'x64', 'xlarge']"
          - target: x86_64-apple-darwin
            # large are on intel
            os: "'macos-latest-large'"
          - target: aarch64-apple-darwin
            # xlarge are on arm
            os: "'macos-latest-xlarge'"
          - target: x86_64-pc-windows-msvc
            os: "'windows-large-runner'"
          - target: aarch64-unknown-linux-gnu
            # xlarge-c8g: precompiled binaries run on arbitrary user hardware,
            # so build on the oldest-generation arm64 pool.
            os: "['self-hosted', 'aws', 'arm64', 'xlarge-c8g']"
    name: Build Convex Backend
    runs-on: ${{ fromJSON(matrix.os) }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # rusty_v8 contains deeply nested Chromium sources that exceed MAX_PATH
      # under the default user-profile Cargo directory.
      - name: Use short CARGO_HOME on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: echo 'CARGO_HOME=C:\c' >> "$GITHUB_ENV"

      # Windows-only: Defender's real-time scan of every small file dominates the
      # cargo/JS build wall-clock. Exclude the file-heavy dirs (best-effort).
      - name: Exclude build dirs from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($p in @(
            "${{ github.workspace }}",
            "$env:LOCALAPPDATA\pnpm",
            "$env:CARGO_HOME"
          )) { Add-MpPreference -ExclusionPath $p -ErrorAction SilentlyContinue }
          Add-MpPreference -ExclusionProcess node.exe -ErrorAction SilentlyContinue

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          r2-access-key: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      # Restore-only: OSS can't write this cache (cache-write role is get-convex/convex-only).
      - name: Restore pnpm artifacts
        uses: runs-on/cache/restore@bd330c5a5f6cbb837823ee25864f3c71a211c2e3 # v5.0.5
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          RUNS_ON_S3_BUCKET_CACHE: ${{ vars.RUNS_ON_S3_BUCKET_CACHE }}
        with:
          path: |
            ~/.local/share/pnpm/store
            ~\AppData\Local\pnpm\store
            npm-packages/.turbo/cache
          key:
            pnpm-cache-${{ hashFiles('npm-packages/pnpm-lock.yaml') }}-3
          restore-keys: pnpm-cache-

      - name: Install mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: NPM install globals
        run: npm ci --prefix scripts

      # pnpm only defaults to this store path when the workspace shares a drive
      # with $HOME; Windows runners check out on another drive, where the
      # default would miss the cache path above.
      - name: Pin pnpm store to the cached path (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "npm_config_store_dir=$LOCALAPPDATA/pnpm/store" >> "$GITHUB_ENV"

      - name: Install JS
        shell: bash
        run: |
          just install-js

      - name: Precompute release name
        id: release_name
        shell: bash
        run: |
          echo "RELEASE_NAME=$(date +'%Y-%m-%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          ZIP_NAME=convex-local-backend-${{ matrix.target }}.zip
          BINARY_NAME=convex-local-backend${{ runner.os == 'Windows' && '.exe' || '' }}
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_OUTPUT

      - name: Build backend
        shell: bash
        run: |
          set -ex
          unset ROCKSDB_LIB_DIR
          unset SODIUM_USE_PKG_CONFIG
          unset SNAPPY_LIB_DIR
          export AWS_LC_SYS_PREBUILT_NASM=1
          # Ninja avoids cmake-rs's MSVC-generator autodetect, which panics
          # building aws-lc-sys on windows-latest's VS2026 (aws/aws-lc-rs#780).
          if [ "$RUNNER_OS" = "Windows" ]; then export CMAKE_GENERATOR=Ninja; fi
          cargo build --release -p local_backend --bin convex-local-backend
          mv target/release/${{ steps.release_name.outputs.BINARY_NAME }} .

      - name: Zip backend into arch
        uses: thedoctor0/zip-release@7fddfdd07cadb5b8c6c0dbcdcec17f8cd7784b80 # 0.7.5
        with:
          type: zip
          filename: ${{ steps.release_name.outputs.ZIP_NAME }}
          path: ${{ steps.release_name.outputs.BINARY_NAME }}

      - name: Create Upload Precompiled Artifacts
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            ${{ steps.release_name.outputs.ZIP_NAME }}
            LICENSE.md
          tag_name: precompiled-${{ steps.release_name.outputs.RELEASE_NAME }}
          name: Precompiled ${{ steps.release_name.outputs.RELEASE_NAME }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
