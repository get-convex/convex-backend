name: Tag Self-Hosted Images as latest

on:
  workflow_dispatch:
    inputs:
      github_sha:
        description:
          "Rev to tag as latest. Pick from
          https://github.com/get-convex/convex-backend/pkgs/container/convex-backend"
        type: string
        required: true

env:
  IMAGE_NAMESPACE: ${{ vars.GHCR_NAMESPACE != '' && vars.GHCR_NAMESPACE || github.repository_owner }}
  BACKEND_IMAGE_NAME: ${{ vars.BACKEND_IMAGE_NAME != '' && vars.BACKEND_IMAGE_NAME || 'convex-backend' }}
  DASHBOARD_IMAGE_NAME: ${{ vars.DASHBOARD_IMAGE_NAME != '' && vars.DASHBOARD_IMAGE_NAME || 'convex-dashboard' }}

jobs:
  tag_images_as_latest:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Modify convex-backend manifest with latest tag
        run: |
          digests=$(docker manifest inspect ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ inputs.github_sha }} | jq -r '.manifests[].digest')
          args=()
          for digest in $digests; do
            args+=(--amend "ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}@$digest")
          done
          docker manifest create ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:latest "${args[@]}"
          docker manifest push ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Modify dashboard manifest with latest tag
        run: |
          digests=$(docker manifest inspect ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.DASHBOARD_IMAGE_NAME }}:${{ inputs.github_sha }} | jq -r '.manifests[].digest')
          args=()
          for digest in $digests; do
            args+=(--amend "ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.DASHBOARD_IMAGE_NAME }}@$digest")
          done
          docker manifest create ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.DASHBOARD_IMAGE_NAME }}:latest "${args[@]}"
          docker manifest push ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ env.DASHBOARD_IMAGE_NAME }}:latest
