name: Setup Rust
description: Common setup for Rust builds
inputs:
  github-token:
    required: true
    description: "pass secrets.GITHUB_TOKEN"
  r2-access-key:
    required: true
    description: "pass secrets.R2_ACCESS_KEY_ID"
  r2-secret-key:
    required: true
    description: "pass secrets.R2_SECRET_ACCESS_KEY"

runs:
  using: composite
  steps:
    - name: Install libsodium and libssl
      shell: bash
      if: runner.os == 'Linux'
      run: sudo apt-get install pkg-config libsodium-dev libssl-dev

    # The runner AMI ships a prebuilt librocksdb but no pkg-config .pc, so mise's
    # ROCKSDB_COMPILE check fails and librocksdb-sys rebuilds it from source every
    # run. Write a .pc for the prebuilt so it links instead (no-op if one exists).
    # TODO: ship the .pc from the AMI (`make install`) and drop this.
    - name: Make prebuilt rocksdb discoverable via pkg-config
      shell: bash
      if: runner.os == 'Linux'
      run: |
        if pkg-config --exists rocksdb 2>/dev/null; then
          echo "pkg-config already resolves rocksdb $(pkg-config --modversion rocksdb)"
          exit 0
        fi
        so=$(ls /usr/lib/librocksdb.so.[0-9]* /lib/librocksdb.so.[0-9]* \
               /usr/local/lib/librocksdb.so.[0-9]* 2>/dev/null | sort -V | tail -1 || true)
        if [ -z "$so" ]; then
          echo "::notice::no prebuilt librocksdb found; it will build from source"
          exit 0
        fi
        ver=${so##*librocksdb.so.}
        echo "found prebuilt librocksdb $ver at $so; writing rocksdb.pc"
        sudo mkdir -p /usr/lib/pkgconfig
        printf 'libdir=%s\nincludedir=/usr/include\n\nName: rocksdb\nDescription: RocksDB prebuilt on the runner image\nVersion: %s\nLibs: -L${libdir} -lrocksdb\nCflags: -I${includedir}\n' \
          "$(dirname "$so")" "$ver" | sudo tee /usr/lib/pkgconfig/rocksdb.pc >/dev/null
        pkg-config --modversion rocksdb

    - name: Install Rust
      uses: dsherret/rust-toolchain-file@3551321aa44dd44a0393eb3b6bdfbc5d25ecf621 # v1

    - name: Install Mold
      uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

    - name: Export environment variables
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> $GITHUB_ENV
        echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        if [ "$RUNNER_OS" == "Linux" ]; then
          echo "SNAPPY_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "SODIUM_USE_PKG_CONFIG=1" >> $GITHUB_ENV
          echo "ROCKSDB_LIB_DIR=/usr/lib" >> $GITHUB_ENV
          if [ "$(uname -m)" == "x86_64" ] && command -v ld.mold >/dev/null; then
            # Nightly rustc defaults to its bundled rust-lld on x86_64-linux
            # (via an injected gcc -B dir containing "ld"), so the mold
            # installed above goes unused without an explicit opt-in.
            # -fuse-ld=mold makes the gcc driver search for "ld.mold" —
            # absent from the injected dir, found on PATH via setup-mold —
            # so it wins over the injection. mold links faster and with less
            # memory than rust-lld, which matters for the giant test-binary
            # link tail. Jammy's gcc 11.4 accepts -fuse-ld=mold (Ubuntu
            # backport of the gcc 12.1 feature).
            # The env var is target-scoped: aarch64 must keep the rustflags in
            # .cargo/config.toml, which a triple-scoped env var would replace.
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=-Clink-arg=-fuse-ld=mold" >> $GITHUB_ENV
          fi
        fi
        echo "CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse" >> $GITHUB_ENV
        echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> $GITHUB_ENV

    - name: Install sccache
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      with:
        version: "v0.16.0"

    - name: Start sccache
      shell: bash
      env:
        # Never idle-exit. Linking test binaries doesn't go through sccache, so
        # a long link tail (>600s, the default idle timeout) makes the server
        # shut down mid-build; the rest then compiles locally without the cache.
        SCCACHE_IDLE_TIMEOUT: "0"
        R2_ACCESS_KEY: ${{ inputs.r2-access-key }}
        R2_SECRET_KEY: ${{ inputs.r2-secret-key }}
        IS_SELF_HOSTED: ${{ runner.environment == 'self-hosted' }}
      run: |
        if [ "$IS_SELF_HOSTED" = "true" ]; then
          # In-VPC S3 via the runner's instance profile (IMDSv2, no static creds),
          # same bucket as the rust-cache. Lower-latency than R2 from us-west-2.
          export SCCACHE_BUCKET=convex-ci-cache SCCACHE_S3_KEY_PREFIX=sccache
          export SCCACHE_REGION=us-west-2 AWS_REGION=us-west-2
        else
          # GitHub-hosted OSS mac/windows have no IMDS; use R2 with static creds.
          export SCCACHE_ENDPOINT=https://a4aa0fffebef8bc497f64875c40ee6fb.r2.cloudflarestorage.com
          export SCCACHE_BUCKET=cvx-actions-cache SCCACHE_REGION=auto
          export AWS_ACCESS_KEY_ID=$R2_ACCESS_KEY AWS_SECRET_ACCESS_KEY=$R2_SECRET_KEY
        fi
        # Try to start sccache up to 3 times. Sometimes it times out for unknown reasons.
        (r=3;while ! sccache --start-server ; do ((--r))||exit;sleep 5;done)

    # n.b. this action inspects the environment and variables starting with
    # `CARGO_` are used as part of the cache key.
    # If users of this composite action add additional `CARGO_*` variables after
    # this step runs, the cache key used for storing the job outputs will not
    # match the cache key used for restoring.
    - name: Cached load of cargo registry
      uses: get-convex/rust-cache@afa9e83d23492b0f5abfc75bdc109dbd8a2e5e18 # agent/s3-cache-provider
      env:
        # The S3 provider reads the region from the environment; credentials
        # come from the runner's instance profile via the SDK default chain.
        AWS_REGION: us-west-2
      with:
        cache-provider: "s3"
        # Bucket and region are hardcoded like the sccache R2 endpoint above;
        # composite actions cannot read `vars.*`. Self-hosted runners (shared
        # by this repo and the copybara-exported OSS repo) reach this in-VPC
        # bucket; GitHub-hosted runners (the OSS mac/windows precompile jobs)
        # can't, so the empty bucket makes the fork fall back to the GitHub
        # cache provider there.
        s3-bucket:
          ${{ runner.environment == 'self-hosted' && 'convex-ci-cache' || '' }}
        # One shared cache entry for all jobs instead of a per-job key; the
        # jobs' cargo registries are near-identical and the entry is only
        # ~/.cargo (registry + git checkouts), not job-specific artifacts.
        shared-key: cargo-registry
        # Only cache the `.cargo` directory; not build artifacts.
        cache-targets: "false"
        cache-bin: "false"
        # The shared S3 entry has no branch scoping and ~/.cargo contents are
        # executed on restore, so on self-hosted runners only the protected
        # main/release branches may write it; PRs restore read-only. On
        # GitHub-hosted runners (OSS mac/windows) the empty bucket falls back
        # to GitHub's own branch-scoped cache, which is safe to save on any
        # branch -- so keep the default there rather than starving those jobs.
        save-if: >-
          ${{ runner.environment != 'self-hosted' || github.ref ==
          'refs/heads/main' || github.ref == 'refs/heads/release' }}
