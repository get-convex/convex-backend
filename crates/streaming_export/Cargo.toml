[package]
name = "streaming_export"
version = "0.1.0"
edition = "2024"
license = "LicenseRef-FSL-1.1-Apache-2.0"

[lib]
doctest = false

[features]
testing = [
    "common/testing",
    "database/testing",
    "keybroker/testing",
    "table_iteration/testing",
    "usage_tracking/testing",
    "value/testing",
]

[dependencies]
anyhow = { workspace = true }
common = { workspace = true }
database = { workspace = true }
fastrace = { workspace = true }
keybroker = { workspace = true }
pb_data_sync = { workspace = true }
prost = { workspace = true }
table_iteration = { workspace = true }
tracing = { workspace = true }
usage_tracking = { workspace = true }
value = { workspace = true }

[dev-dependencies]
common = { workspace = true, features = ["testing"] }
database = { workspace = true, features = ["testing"] }
keybroker = { workspace = true, features = ["testing"] }
table_iteration = { workspace = true, features = ["testing"] }
usage_tracking = { workspace = true, features = ["testing"] }
value = { workspace = true, features = ["testing"] }

[lints]
workspace = true
