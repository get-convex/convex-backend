authors = ["Convex, Inc. <no-reply@convex.dev>"]
edition = "2024"
license = "LicenseRef-FSL-1.1-Apache-2.0"

[lib]
doctest = false

[features]
testing = [
    "must-let",
    "common/testing",
    "database/testing",
    "errors/testing",
    "events/testing",
    "keybroker/testing",
