[env]
CARGO_WORKSPACE_ROOT = { value = "", relative = true }
CHRONO_TZ_TIMEZONE_FILTER = "US/Pacific"
# Custom rusty_v8 build: V8 14.9.207.26 with the leaptiering dispatch-handle
# UAF fixes (JSFunction 8e1b07549b03 + FeedbackCell, bugs 511279942/512734866)
# plus three post-14.9 backports: SharedFunctionInfo publication race on the
# background-merge path (35580b908ad, bug 511219512) and two regexp tier-up
# fixes (2f3fea02141 peephole stale offsets, f55c4ff2410 RegExpData TOCTOU).
# Built by get-convex/rusty_v8 @ tag v149.2.3; the crate is pinned to that tag
# via [patch.crates-io] in the workspace Cargo.toml so the download URL
# (…/v149.2.3/…) is content-stable and reproducible.
RUSTY_V8_MIRROR = "https://github.com/get-convex/rusty_v8/releases/download"

[target.aarch64-unknown-linux-gnu]
rustflags = ["-Ctarget-cpu=neoverse-n1", "-Cforce-frame-pointers=yes"]

[target.aarch64-apple-darwin]
rustflags = ["-Ctarget-cpu=apple-m1"]

[target.x86_64-pc-windows-msvc]
# FORCE:MULTIPLE is a bit sketchy. v8 and rocksdb both export the same symbol.
# This seems to work around it to build on windows, but it's not ideal.
rustflags = ["-Clink-arg=/FORCE:MULTIPLE", "-Clink-arg=/STACK:4194304"]

[target.'cfg(all())']
rustflags = ["--cfg", "tokio_unstable"]

[net]
git-fetch-with-cli = true
