autoInstallPeers: true
minimumReleaseAge: 10080
# The next security overrides below force a brand-new next version; next pins
# its @next/swc platform binaries to that exact (equally new) version, which
# would otherwise hard-fail the age gate whenever any importer re-resolves.
minimumReleaseAgeExclude:
  - next
  - "@next/swc-*"
  # First-party publishes; satellite packages pin `convex@^<latest>` right
  # after a release, which would otherwise fail the age gate whenever anything
  # re-resolves (e.g. `pnpm deploy`) during the 7 days after a convex release.
  - convex
overrides:
  # domain-browser switched away from MIT after 4.22.0 (was a Rush
